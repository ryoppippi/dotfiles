name: Nix Diff Check

on:
  pull_request:
    paths:
      - 'flake.lock'
      - 'flake.nix'
      - 'nix/**'

permissions:
  contents: read
  pull-requests: write

jobs:
  nix-diff:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Setup Nix
        uses: ./.github/actions/setup-nix

      - name: Run nix-diff
        uses: natsukium/nix-diff-action@da77421e857e294395143dce0026807f1277b9e8 # main
        with:
          skip-no-change: true
          # Note: darwinConfigurations cannot be built on Linux runners
          attributes: |
            - displayName: home-manager (x86_64-linux)
              attribute: homeConfigurations.ryoppippi.activationPackage
            - displayName: home-manager (aarch64-linux)
              attribute: homeConfigurations.ryoppippi-aarch64.activationPackage
