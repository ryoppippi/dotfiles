name: 'CI: Nix build'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Check if Nix-related files changed
  changes:
    runs-on: ubuntu-24.04-arm
    outputs:
      nix: ${{ steps.filter.outputs.nix }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        id: filter
        with:
          filters: |
            nix:
              - 'flake.nix'
              - 'flake.lock'
              - 'nix/**'
              - '.github/workflows/nix-build.yaml'
              - '.github/actions/setup-nix/**'

  # Security gate: scan the repo for hidden content and config poisoning
  # before any build runs. Build jobs depend on this passing.
  security:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: ./.github/actions/setup-nix

      - name: Install tirith
        run: nix profile install --inputs-from . nixpkgs#tirith

      # Exclude binary PDFs: tirith reads them as pasted text and reports
      # false-positive HIGH findings (ANSI escapes, control/confusable chars).
      #
      # tirith exit codes: 0 = clean, 1 = high/critical findings (block the
      # gate), 2 = only findings below the --fail-on threshold (allow). The
      # gate must fail only on code 1, so 0 and 2 are treated as passing.
      - name: Scan repository
        run: |
          set +e
          tirith scan . --exclude '.git/**' --exclude '*.pdf' --ci --fail-on high
          rc=$?
          if [ "$rc" -eq 0 ] || [ "$rc" -eq 2 ]; then
            exit 0
          fi
          exit "$rc"

  build-ubuntu:
    needs: [changes, security]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Skip if no Nix changes
        if: needs.changes.outputs.nix != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Nix-related changes detected, skipping build"

      - name: Checkout repository
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/setup-nix

      - name: Build Linux (Home Manager) configuration
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          nix build .#homeConfigurations.ryoppippi.activationPackage \
            --print-build-logs \
            --show-trace

  build-ubuntu-arm:
    needs: [changes, security]
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - name: Skip if no Nix changes
        if: needs.changes.outputs.nix != 'true' && github.event_name != 'workflow_dispatch'
        run: echo "No Nix-related changes detected, skipping build"

      - name: Checkout repository
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Setup Nix
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        uses: ./.github/actions/setup-nix

      - name: Build Linux (Home Manager) configuration for aarch64
        if: needs.changes.outputs.nix == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          nix build .#homeConfigurations.ryoppippi-aarch64.activationPackage \
            --print-build-logs \
            --show-trace
